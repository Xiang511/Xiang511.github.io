<!DOCTYPE html>
<html>
    <link>
        <meta charset="utf-8">
        <title>電燈開關</title>
        <link rel="stylesheet" href ="style.css">
    </head>
    <body onbeforeunload="checkLeave()">
        <div class="light">
            <div class="wire"></div>
            <div class="bulb">
                <span></span>
                <span></span>
            </div>
            <div class="switch">
                <div class="btn"></div>
            </div>
        </div>
        <audio id="audio" src="switch1.mp3" autostart="false"></audio>
        <script>
            let btn = document.querySelector('.btn');
            let body = document.querySelector('body');
            let audio = document.querySelector('audio');
            btn.onclick = function(){

                body.classList.toggle('on');
                audio.play();
            }
        </script>
   
        <script>
            function checkLeave(){
                event.returnValue="確定離開當前頁面?";
            }
        </script>

        
    </body>
</html>
